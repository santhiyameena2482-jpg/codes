<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button id="myButton"></button>
    <p id="countDisplay"></p>
    <script>
        const btn=document.getElementById("myButton");
        const count_Display=document.getElementById("countDisplay");
        btn.textContent="click here";
        let i=0;
        btn.addEventListener("click",function(){
         i++;
        console.log(i);
        count_Display.textContent="Button clicked " + i +" times";
        });
        
        </script>
</body>
</html>
